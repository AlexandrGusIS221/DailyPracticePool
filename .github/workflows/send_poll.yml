name: Send Daily Practice Poll

on:
  schedule:
    # Запускаем каждый день с понедельника по субботу (1-6) в 04:00 UTC (09:00 по Екатеринбургу, UTC+5)
    - cron: '0 3 * * 1-6'
  workflow_dispatch:   # позволяет запускать вручную из интерфейса GitHub
jobs:
  send-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poll script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python poll_bot.py
